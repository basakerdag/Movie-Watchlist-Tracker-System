<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineTrack - Personal Movie Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
        }
        .form-control, .form-select {
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
        }
        .form-control:focus, .form-select:focus {
            background-color: #0d1117;
            border-color: #58a6ff;
            color: #c9d1d9;
            box-shadow: none;
        }
        .badge-towatch { background-color: #388bfd; color: #fff; }
        .badge-watched { background-color: #238636; color: #fff; }
        .rating-stars { color: #ffc107; font-size: 1.1rem; }
        .movie-poster {
            width: 45px;
            height: 65px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #30363d;
        }
        .metric-card {
            background: linear-gradient(145deg, #1f242c, #161b22);
            border-left: 4px solid #58a6ff;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark border-bottom border-secondary mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-info" href="#">🎬 CineTrack Dashboard</a>
            <span class="text-muted d-none d-sm-inline">System Analysis & Design Project</span>
        </div>
    </nav>

    <div class="container mb-5">
        
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card p-3 metric-card">
                    <small class="text-muted text-uppercase fw-bold">Total Movies</small>
                    <h3 class="m-0 fw-bold text-white" id="statTotal">0</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 metric-card" style="border-left-color: #238636;">
                    <small class="text-muted text-uppercase fw-bold">Total Watch Time</small>
                    <h3 class="m-0 fw-bold text-white" id="statRuntime">0 Min</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 metric-card" style="border-left-color: #ffc107;">
                    <small class="text-muted text-uppercase fw-bold">Average Rating</small>
                    <h3 class="m-0 fw-bold text-white" id="statRating">0 / 5</h3>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card p-4 shadow-sm" id="movieForm">
                    <h5 class="mb-4 text-white fw-bold border-bottom border-secondary pb-2">Add Movie Tracker</h5>
                    <form id="actualForm">
                        <div class="mb-3">
                            <label for="title" class="form-label text-light small">Original Title *</label>
                            <input type="text" id="title" class="form-control" placeholder="e.g. Interstellar" required>
                        </div>
                        <div class="row g-2 mb-3">
                            <div class="col-6">
                                <label for="director" class="form-label text-light small">Director</label>
                                <input type="text" id="director" class="form-control" placeholder="e.g. C. Nolan">
                            </div>
                            <div class="col-6">
                                <label for="releaseYear" class="form-label text-light small">Release Year</label>
                                <input type="number" id="releaseYear" class="form-control" placeholder="e.g. 2014">
                            </div>
                        </div>
                        <div class="row g-2 mb-3">
                            <div class="col-6">
                                <label for="category" class="form-label text-light small">Category *</label>
                                <select id="category" class="form-select" default="1">
                                    <option value="1">Action</option>
                                    <option value="2">Drama</option>
                                    <option value="3">Sci-Fi</option>
                                    <option value="4">Comedy</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label for="runtime" class="form-label text-light small">Runtime (Minutes)</label>
                                <input type="number" id="runtime" class="form-control" placeholder="e.g. 148">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="posterUrl" class="form-label text-light small">Cover Poster Image URL</label>
                            <input type="url" id="posterUrl" class="form-control" placeholder="https://example.com/poster.jpg">
                        </div>
                        <div class="mb-3">
                            <label for="status" class="form-label text-light small">Watch Status *</label>
                            <select id="status" class="form-select">
                                <option value="To Watch">To Watch</option>
                                <option value="Watched">Watched</option>
                            </select>
                        </div>
                        <div id="watchedFields" style="display: none;" class="bg-dark p-3 rounded border border-secondary mb-3">
                            <div class="mb-2">
                                <label for="rating" class="form-label text-warning small">Personal Rating (1-5) *</label>
                                <input type="number" id="rating" class="form-control border-warning" min="1" max="5" placeholder="e.g. 5">
                            </div>
                            <div>
                                <label for="personalNote" class="form-label text-light small">Personal Analysis Note</label>
                                <textarea id="personalNote" class="form-control" rows="2" placeholder="Write your thoughts..."></textarea>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 mt-2">Save Movie</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card p-4 shadow-sm">
                    <div class="row g-2 mb-4 border-bottom border-secondary pb-3">
                        <div class="col-md-7">
                            <input type="text" id="searchInput" class="form-control" placeholder="Search movies dynamically by title string...">
                        </div>
                        <div class="col-md-5">
                            <select id="filterCategory" class="form-select">
                                <option value="">All Categories</option>
                                <option value="1">Action</option>
                                <option value="2">Drama</option>
                                <option value="3">Sci-Fi</option>
                                <option value="4">Comedy</option>
                            </select>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-dark table-hover align-middle m-0">
                            <thead>
                                <tr class="text-muted small border-secondary">
                                    <th style="width: 60px;">Poster</th>
                                    <th>Title</th>
                                    <th>Director</th>
                                    <th>Year</th>
                                    <th>Category</th>
                                    <th>Status</th>
                                    <th>Rating</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="movieTableBody">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
